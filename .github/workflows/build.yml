name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev clang cmake pkg-config
        
    - name: Install frontend dependencies
      run: |
        cd crates/turbo-ui
        npm install
        npm run build
      working-directory: .
      
    - name: Build Tauri app for Linux
      run: |
        cargo tauri build
      working-directory: src-tauri
      
    - name: Build all workspace packages
      run: |
        cargo build --release
      working-directory: .
      
    - name: Run tests
      run: |
        cargo test --verbose
      working-directory: .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-binaries
        path: |
          target/release/turbo*
          src-tauri/target/release/bundle/deb/**
          src-tauri/target/release/bundle/appimage/**
          src-tauri/target/release/bundle/rpm/**
        retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install frontend dependencies
      run: |
        cd crates/turbo-ui
        npm install
        npm run build
      shell: bash
        
    - name: Build Tauri app for Windows
      run: |
        cargo tauri build
      working-directory: src-tauri
      
    - name: Build all workspace packages
      run: |
        cargo build --release
      working-directory: .
      
    - name: Run tests
      run: |
        cargo test --verbose
      working-directory: .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-binaries
        path: |
          target/release/turbo*.exe
          src-tauri/target/release/bundle/msi/**
        retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install frontend dependencies
      run: |
        cd crates/turbo-ui
        npm install
        npm run build
      working-directory: .
      
    - name: Build Tauri app for macOS
      run: |
        cargo tauri build
      working-directory: src-tauri
      
    - name: Build all workspace packages
      run: |
        cargo build --release
      working-directory: .
      
    - name: Run tests
      run: |
        cargo test --verbose
      working-directory: .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-binaries
        path: |
          target/release/turbo*
          src-tauri/target/release/bundle/dmg/**
        retention-days: 30