name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/create-github-release@v1
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
      - name: Output Release ID
        run: echo "Release ID is ${{ steps.create-release.outputs.result }}"

  build-windows:
    needs: create-release
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
        
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install dependencies (Windows)
      run: |
        # Install WebView2 for Windows
        choco install microsoft-edge-webview2-runtime -y
      continue-on-error: true

    - name: Install frontend dependencies
      run: npm install
      working-directory: ./crates/turbo-ui

    - name: Build frontend
      run: npm run build
      working-directory: ./crates/turbo-ui

    - name: Install cargo-tauri
      run: npm install -g @tauri-apps/cli

    - name: Build Tauri App
      run: |
        $env:TAURI_PRIVATE_KEY = "${{ secrets.TAURI_PRIVATE_KEY }}"
        $env:TAURI_KEY_PASSWORD = "${{ secrets.TAURI_KEY_PASSWORD }}"
        cargo tauri build --target ${{ matrix.target }} --release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.release_id }}
        asset_path: ./src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
        asset_name: TurboDownload_${{ github.ref_name }}_x64.msi
        asset_content_type: application/octet-stream

  build-linux:
    needs: create-release
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
        
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install dependencies (Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y webkit2gtk-4.0 libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev
        sudo apt-get install -y curl wget file desktop-file-utils libxcb-shape0-dev libxcb-xfixes0-dev

    - name: Install frontend dependencies
      run: npm install
      working-directory: ./crates/turbo-ui

    - name: Build frontend
      run: npm run build
      working-directory: ./crates/turbo-ui

    - name: Install cargo-tauri
      run: npm install -g @tauri-apps/cli

    - name: Build Tauri App
      run: |
        cargo tauri build --target ${{ matrix.target }} --release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.release_id }}
        asset_path: ./src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
        asset_name: TurboDownload_${{ github.ref_name }}_amd64.AppImage
        asset_content_type: application/octet-stream

  build-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
        
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install frontend dependencies
      run: npm install
      working-directory: ./crates/turbo-ui

    - name: Build frontend
      run: npm run build
      working-directory: ./crates/turbo-ui

    - name: Install cargo-tauri
      run: npm install -g @tauri-apps/cli

    - name: Build Tauri App
      run: |
        cargo tauri build --target ${{ matrix.target }} --release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.release_id }}
        asset_path: ./src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        asset_name: TurboDownload_${{ github.ref_name }}_${{ matrix.target }}.dmg
        asset_content_type: application/octet-stream