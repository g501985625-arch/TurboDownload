name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install dependencies (Windows)
      run: |
        # Install WebView2 for Windows
        choco install microsoft-edge-webview2-runtime
      continue-on-error: true

    - name: Install frontend dependencies
      run: npm install
      working-directory: ./

    - name: Build frontend
      run: npm run build
      working-directory: ./

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Install cargo-tauri
      uses: taiki-e/install-action@cargo-tauri

    - name: Build Tauri App
      run: |
        $env:TAURI_PRIVATE_KEY = "${{ secrets.TAURI_PRIVATE_KEY }}"
        $env:TAURI_KEY_PASSWORD = "${{ secrets.TAURI_KEY_PASSWORD }}"
        cargo tauri build --target ${{ matrix.target }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts-${{ matrix.target }}
        path: |
          src-tauri/target/${{ matrix.target }}/release/bundle/msi/*
          src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*