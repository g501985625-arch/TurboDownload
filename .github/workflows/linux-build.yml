name: Linux Build Only

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev clang cmake pkg-config
        
    - name: Install frontend dependencies
      run: |
        npm install
        npm run build
      working-directory: .
      
    - name: Build Tauri app for Linux
      run: |
        cargo tauri build
      working-directory: src-tauri
      
    - name: Build all workspace packages
      run: |
        cargo build --release
      working-directory: .
      
    - name: Run tests
      run: |
        cargo test --verbose
      working-directory: .

    - name: List build artifacts
      run: |
        echo "Listing all built binaries:"
        find . -name "*turbo*" -type f -executable -path "./target/*" 2>/dev/null || echo "No executable binaries found"
        echo "Listing Tauri bundles:"
        ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle directory found"
        find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle files found"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-binaries
        path: |
          target/release/turbo*
          src-tauri/target/release/bundle/**
        retention-days: 30

  deploy-to-release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-binaries
        path: ./artifacts
        
    - name: Display artifacts
      run: ls -la ./artifacts/
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.sha }}
        release_name: Release ${{ github.sha }}
        draft: false
        prerelease: false
        
    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/
        asset_name: linux-build-${{ github.sha }}
        asset_content_type: application/octet-stream